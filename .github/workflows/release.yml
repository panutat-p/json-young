name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release app
        run: |
          chmod +x Scripts/bundle-app.sh
          Scripts/bundle-app.sh release

      - name: Create DMG
        run: |
          chmod +x Scripts/create-dmg.sh
          Scripts/create-dmg.sh "$GITHUB_WORKSPACE"

      - name: Compute SHA256
        id: sha256
        run: |
          SHA=$(shasum -a 256 JSON_Young.dmg | awk '{print $1}')
          echo "SHA256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: JSON Young ${{ github.ref_name }}
          body: |
            ## JSON Young ${{ github.ref_name }}

            ### Install via Homebrew
            ```bash
            brew tap panutat-p/tap
            brew install --cask json-young
            ```

            ### Manual install
            Download `JSON_Young.dmg` below, open it, and drag **JSON Young.app** to Applications.

            ---
            **SHA256:** `${{ steps.sha256.outputs.SHA256 }}`
          files: JSON_Young.dmg
          draft: false
          prerelease: false

      - name: Trigger tap update
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          repository: panutat-p/homebrew-tap
          event-type: update-cask
          client-payload: |
            {
              "cask": "json-young",
              "version": "${{ steps.version.outputs.VERSION }}",
              "sha256": "${{ steps.sha256.outputs.SHA256 }}"
            }
